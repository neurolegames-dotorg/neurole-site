<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Neurole AI Test</title>
<style>
body{font-family:sans-serif;max-width:500px;margin:60px auto;padding:20px;}
textarea{width:100%;padding:10px;font-size:15px;border:1px solid #ccc;border-radius:8px;height:80px;margin-bottom:10px;box-sizing:border-box;}
button{background:#6B4F94;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:15px;cursor:pointer;width:100%;}
#result{margin-top:16px;padding:14px;background:#f5f3fa;border-radius:8px;font-size:15px;line-height:1.6;white-space:pre-wrap;display:none;}
#log{margin-top:10px;font-family:monospace;font-size:12px;color:#666;}
</style>
</head>
<body>
<h2>🧠 Neurole AI Direct Test</h2>
<p style="color:#666;font-size:14px;">This bypasses config.js and tests the Groq API key directly.</p>
<textarea id="q" placeholder="Ask a neuroscience question…">What does the hippocampus do?</textarea>
<button onclick="test()">Test AI →</button>
<div id="result"></div>
<div id="log"></div>

<script>
const p1='gsk_PRTnVg2SnS0fCB8qD0gK',p2='WGdyb3FYGQrdhrIHqFGZ6xpiw9em2Yp3';
const KEY=p1+p2;
const log = s => { document.getElementById('log').textContent += s + '\n'; console.log(s); };

async function test(){
  const q = document.getElementById('q').value.trim();
  const result = document.getElementById('result');
  result.style.display = 'block';
  result.textContent = 'Asking AI…';
  document.getElementById('log').textContent = '';

  for(const model of ['llama-3.1-8b-instant','llama-3.3-70b-versatile','gemma2-9b-it','mixtral-8x7b-32768']){
    log('Trying model: ' + model);
    try{
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer ' + KEY},
        body:JSON.stringify({model,messages:[{role:'user',content:q}],max_tokens:300})
      });
      const data = await res.json();
      log('Status: ' + res.status + (data?.error ? ' | Error: ' + data.error.message : ' | OK'));
      if(res.ok && data?.choices?.[0]?.message?.content){
        result.textContent = '✓ ' + model + ' answered:\n\n' + data.choices[0].message.content;
        return;
      }
    }catch(err){ log('Network error: ' + err.message); }
  }
  result.textContent = '✗ All models failed. See log below.';
}
</script>

<!-- Subscribe modal -->
<div id="reminder-signup-modal" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="sub-card">
    <div class="sub-top" style="background:#1a1a1a;padding:28px 28px 22px;text-align:center;">
      <p style="font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.5);margin:0 0 8px;">Neurole</p>
      <h3 style="font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;color:#fff;margin:0 0 8px;letter-spacing:-.01em;">Daily Brain Case</h3>
      <p style="font-family:'Outfit',sans-serif;font-size:14px;color:rgba(255,255,255,.65);margin:0;line-height:1.6;">One email every morning — today's neurological case, ready to play.</p>
    </div>
    <div class="sub-body" style="padding:24px 28px 26px;background:#fff;">
      <form id="sub-form" action="https://formspree.io/f/maqgkjlr" method="POST">
        <input type="hidden" name="_subject" value="Neurole — Daily case subscriber">
        <input type="hidden" name="type" value="daily_subscriber">
        <div class="field">
          <label style="font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-soft);display:block;margin-bottom:6px;">Email address</label>
          <input type="email" name="email" placeholder="you@example.com" required autocomplete="email"
            style="width:100%;padding:12px 14px;font-family:'Outfit',sans-serif;font-size:15px;border:1.5px solid var(--rule);border-radius:6px;box-sizing:border-box;">
        </div>
        <button class="btn sub-submit" type="submit" style="width:100%;justify-content:center;background:#1a1a1a;border-radius:6px;font-size:14px;padding:13px;margin-top:2px;letter-spacing:.03em;">Continue</button>
        <p id="sub-success-msg" style="display:none;text-align:center;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;color:#3a7d5a;margin-top:12px;">✓ You're in. See you tomorrow morning.</p>
      </form>
      <p style="font-family:'Outfit',sans-serif;font-size:11px;color:var(--ink-soft);text-align:center;margin:14px 0 0;line-height:1.6;">No spam, unsubscribe any time.</p>
      <button class="sub-close-text" onclick="document.getElementById('reminder-signup-modal').classList.remove('open')" style="display:block;width:100%;margin-top:8px;background:none;border:none;font-family:'Outfit',sans-serif;font-size:12px;color:var(--ink-soft);cursor:pointer;padding:4px;text-align:center;">Not now</button>
    </div>
  </div>
</div>
<script>
(function(){
  var f=document.getElementById('sub-form');
  if(!f)return;
  f.addEventListener('submit',function(e){
    e.preventDefault();
    var btn=f.querySelector('.sub-submit');
    btn.textContent='Subscribing…';btn.disabled=true;
    fetch(f.action,{method:'POST',body:new FormData(f),headers:{Accept:'application/json'}})
    .then(function(r){
      if(r.ok){f.style.display='none';document.getElementById('sub-success-msg').style.display='block';}
      else{btn.textContent='Continue';btn.disabled=false;}
    }).catch(function(){btn.textContent='Continue';btn.disabled=false;});
  });
})();
</script>
</body>
</html>
